name: Reusable MacOS workflow

on:
  workflow_call:
    inputs:
      build-type:
        default: RelWithDebInfo
        type: string
      image:
        description: MacOS Runner image
        required: true
        type: string
      release:
        required: false
        default: false
        type: boolean
      release-tag:
        required: false
        default: Fetcher-Simulator-macOS
        type: string
      release-name:
        required: false
        default: Fetcher Simulator macOS
        type: string

jobs:
  MacOS:
    name: ${{ inputs.image }}
    runs-on: ${{ inputs.image }}
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - run: echo "CMAKE_BUILD_TYPE=${{ inputs.build-type }}" >> $GITHUB_ENV

    - run: echo "MACOS_AMD64=true" >> $GITHUB_ENV
      if: ${{ inputs.image == 'macos-15-intel' }}

    - run: echo "DMG_IDENTIFIER=x86_64" >> $GITHUB_ENV
      if: ${{ inputs.image == 'macos-15-intel' }}
    - run: echo "DMG_IDENTIFIER=arm64" >> $GITHUB_ENV
      if: ${{ inputs.image != 'macos-15-intel' }}

    - name: Install Building Dependencies
      run: CI/before_install.macos.sh

    - name: Prime ccache
      uses: hendrikmuhs/ccache-action@v1.2.22
      with:
        key: ${{ inputs.image }}-${{ inputs.build-type }}
        max-size: 1000M

    - name: Configure
      run: CI/before_script.macos.sh -C
    - name: Build
      run: CI/macos/build.sh

    - name: Store dmg
      uses: actions/upload-artifact@v6
      with:
        name: openmw-macos-dmg-${{ env.DMG_IDENTIFIER }}-${{ github.sha }}
        path: |
          ${{ github.workspace }}/build/OpenMW-*.dmg

    - name: Publish stable macOS prerelease
      if: ${{ inputs.release }}
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        ./CI/Publish-StableGitHubRelease.ps1 `
          -Repository "${{ github.repository }}" `
          -Tag "${{ inputs.release-tag }}" `
          -TargetCommit "${{ github.sha }}" `
          -Title "${{ inputs.release-name }}" `
          -Notes "Fetcher Simulator macOS prerelease. Download the arm64 DMG for Apple Silicon or the x86_64 DMG for Intel. Morrowind game data is required and is not included." `
          -Assets (Get-ChildItem "${{ github.workspace }}/build/OpenMW-*.dmg").FullName
