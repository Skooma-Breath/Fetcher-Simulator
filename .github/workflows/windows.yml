name: Reusable Windows workflow

on:
  workflow_call:
    inputs:
      image:
        description: Window Server image
        required: true
        type: string
      msvc:
        description: MSVC version (2022/2026)
        default: "2022"
        type: string
      vcpkg-deps-tag:
        description: Git tag of our deps
        required: true
        type: string
      build-type:
        default: RelWithDebInfo
        type: string
      package:
        default: false
        type: boolean
      release:
        default: false
        type: boolean
      release-tag:
        default: ""
        type: string
      release-name:
        default: ""
        type: string
      release-zip-name:
        default: ""
        type: string
      release-include-installer:
        default: true
        type: boolean
      mod-bundle-url:
        default: ""
        type: string
      mod-bundle-release-tag:
        default: ""
        type: string
      mod-bundle-asset:
        default: "openmw-client-mods.zip"
        type: string
      include-tester-tools:
        default: false
        type: boolean

jobs:
  Windows:
    name: windows-${{ inputs.image }}

    runs-on: windows-${{ inputs.image }}

    env:
      archive: FAILEDTODOWNLOAD
      SCCACHE_GHA_ENABLED: "true"

    steps:
    - name: Install NSIS
      if: ${{ inputs.package }}
      run: choco install nsis

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Patch GameNetworkingSockets for Windows timer APIs
      shell: pwsh
      run: |
        git -C "${{ github.workspace }}/extern/GameNetworkingSockets" apply "${{ github.workspace }}/CI/patches/gamenetworkingsockets-winmm-timer.patch"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Set up sccache
      uses: mozilla-actions/sccache-action@v0.0.10

    - name: Create directories for dependencies
      run: |
        mkdir -p ${{ github.workspace }}/deps
        mkdir -p ${{ github.workspace }}/deps/Qt

    - name: Download prebuilt vcpkg packages
      working-directory: ${{ github.workspace }}/deps
      run: |
        New-Item -ItemType Directory -Force "${{ github.workspace }}/ci-logs" | Out-Null
        $MANIFEST = "vcpkg-x64-windows-${{ inputs.msvc }}-${{ inputs.vcpkg-deps-tag }}-manifest.txt"
        curl --fail --retry 3 -L -o "$MANIFEST" "https://gitlab.com/OpenMW/openmw-deps/-/raw/main/windows/$MANIFEST" 2>&1 | Tee-Object -FilePath "${{ github.workspace }}/ci-logs/01-download-vcpkg.txt"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        $lines = Get-Content "$MANIFEST"
        $URL = $lines[0]
        $split = -split $lines[1]
        $HASH = $split[0]
        $FILE = $split[1]
        curl --fail --retry 3 -L -o "$FILE" "$URL" 2>&1 | Tee-Object -FilePath "${{ github.workspace }}/ci-logs/01-download-vcpkg.txt" -Append
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        $filehash = Get-FileHash "$FILE" -Algorithm SHA512
        if ( $filehash.hash -ne "$HASH" ) {
          exit 1
        }
        echo "archive=$FILE" >> $env:GITHUB_ENV

    - name: Extract archived prebuilt vcpkg packages
      working-directory: ${{ github.workspace }}/deps
      run: 7z x -y -ovcpkg-x64-windows-${{ inputs.msvc }}-${{ inputs.vcpkg-deps-tag }} $env:archive

    - name: Cache Qt
      id: qt-cache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/deps/Qt/6.6.3/msvc2019_64
        key: qt-cache-6.6.3-msvc2019_64-v1

    - name: Download aqt
      if: steps.qt-cache.outputs.cache-hit != 'true'
      working-directory: ${{ github.workspace }}/deps/Qt
      run: >
        curl --fail --retry 3 -L
        -o aqt_x64.exe
        https://github.com/miurahr/aqtinstall/releases/download/v3.1.15/aqt_x64.exe

    - name: Install Qt with aqt
      if: steps.qt-cache.outputs.cache-hit != 'true'
      working-directory: ${{ github.workspace }}/deps/Qt
      run: .\aqt_x64.exe install-qt windows desktop 6.6.3 win64_msvc2019_64

    - name: Cache Protobuf
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/deps/protobuf-install-v3.21.12
        key: protobuf-windows-${{ inputs.image }}-${{ inputs.msvc }}-v3.21.12-msvc-md-v1

    - name: Build Protobuf
      shell: pwsh
      working-directory: ${{ github.workspace }}/deps
      run: |
        New-Item -ItemType Directory -Force "${{ github.workspace }}/ci-logs" | Out-Null
        $protobufTag = "v3.21.12"
        $protobufSrc = "${{ github.workspace }}/deps/protobuf-src-$protobufTag"
        $protobufInstall = "${{ github.workspace }}/deps/protobuf-install-$protobufTag"
        if (-not (Test-Path "$protobufInstall/lib/libprotobufd.lib")) {
          if (-not (Test-Path $protobufSrc)) {
            git clone --depth 1 --branch $protobufTag https://github.com/protocolbuffers/protobuf.git $protobufSrc 2>&1 | Tee-Object -FilePath "${{ github.workspace }}/ci-logs/01-build-protobuf.txt"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          $protobufBuild = "$protobufSrc/build"
          Remove-Item -Recurse -Force $protobufBuild -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $protobufBuild | Out-Null
          cmake "$protobufSrc/cmake" `
            -B $protobufBuild `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -Dprotobuf_BUILD_TESTS=OFF `
            -Dprotobuf_BUILD_PROTOC_BINARIES=ON `
            -Dprotobuf_MSVC_STATIC_RUNTIME=OFF `
            -DCMAKE_INSTALL_PREFIX="$protobufInstall" 2>&1 | Tee-Object -FilePath "${{ github.workspace }}/ci-logs/01-build-protobuf.txt" -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --build $protobufBuild --config Release --target install 2>&1 | Tee-Object -FilePath "${{ github.workspace }}/ci-logs/01-build-protobuf.txt" -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --build $protobufBuild --config Debug --target install 2>&1 | Tee-Object -FilePath "${{ github.workspace }}/ci-logs/01-build-protobuf.txt" -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        } else {
          "Using cached Protobuf install at $protobufInstall" | Tee-Object -FilePath "${{ github.workspace }}/ci-logs/01-build-protobuf.txt"
        }
        "PROTOBUF_INSTALL=$protobufInstall" >> $env:GITHUB_ENV

    - uses: ilammy/msvc-dev-cmd@v1

    - uses: seanmiddleditch/gha-setup-ninja@master

    - name: Configure OpenMW
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force "${{ github.workspace }}/ci-logs" | Out-Null
        $configureArgs = @(
          '-S', '.',
          '-B', '${{ github.workspace }}/build',
          '-G', 'Ninja',
          '-D', 'CMAKE_BUILD_TYPE=${{ inputs.build-type }}',
          '-D', 'CMAKE_C_COMPILER_LAUNCHER=sccache',
          '-D', 'CMAKE_CXX_COMPILER_LAUNCHER=sccache',
          '-D', 'CMAKE_POLICY_DEFAULT_CMP0141=NEW',
          '-D', 'CMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded',
          '-D', 'PRECOMPILE_HEADERS_WITH_MSVC=OFF',
          '-D', 'CMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/deps/vcpkg-x64-windows-${{ inputs.msvc }}-${{ inputs.vcpkg-deps-tag }}/scripts/buildsystems/vcpkg.cmake',
          '-D', 'CMAKE_PREFIX_PATH=${{ github.workspace }}/deps/Qt/6.6.3/msvc2019_64',
          '-D', 'LuaJit_INCLUDE_DIR=${{ github.workspace }}/deps/vcpkg-x64-windows-${{ inputs.msvc }}-${{ inputs.vcpkg-deps-tag }}/installed/x64-windows/include/luajit',
          '-D', 'LuaJit_LIBRARY=${{ github.workspace }}/deps/vcpkg-x64-windows-${{ inputs.msvc }}-${{ inputs.vcpkg-deps-tag }}/installed/x64-windows/lib/lua51.lib',
          '-D', 'BUILD_BENCHMARKS=${{ ! inputs.package }}',
          '-D', 'BUILD_COMPONENTS_TESTS=${{ ! inputs.package }}',
          '-D', 'BUILD_OPENMW_TESTS=${{ ! inputs.package }}',
          '-D', 'BUILD_OPENCS_TESTS=${{ ! inputs.package }}',
          '-D', 'OPENMW_USE_SYSTEM_SQLITE3=OFF',
          '-D', 'OPENMW_USE_SYSTEM_YAML_CPP=OFF',
          '-D', 'OPENMW_LTO_BUILD=ON',
          '-D', 'BUILD_MULTIPLAYER=ON',
          '-D', 'BUILD_DEDICATED_SERVER=ON',
          '-D', 'USE_CRYPTO=BCrypt',
          '-D', 'USE_CRYPTO25519=Reference',
          '-D', "Protobuf_INCLUDE_DIR=$env:PROTOBUF_INSTALL/include",
          '-D', "Protobuf_LIBRARY=$env:PROTOBUF_INSTALL/lib/libprotobuf.lib",
          '-D', "Protobuf_LIBRARY_DEBUG=$env:PROTOBUF_INSTALL/lib/libprotobufd.lib",
          '-D', "Protobuf_LITE_LIBRARY=$env:PROTOBUF_INSTALL/lib/libprotobuf-lite.lib",
          '-D', "Protobuf_LITE_LIBRARY_DEBUG=$env:PROTOBUF_INSTALL/lib/libprotobuf-lited.lib",
          '-D', "Protobuf_PROTOC_EXECUTABLE=$env:PROTOBUF_INSTALL/bin/protoc.exe",
          '-D', 'Protobuf_USE_STATIC_LIBS=ON'
        )
        if ('${{ inputs.package }}' -eq 'true') {
          $configureArgs += @(
            '-D', 'CMAKE_CXX_FLAGS_RELEASE=/O2 /Ob2 /DNDEBUG /Z7',
            '-D', 'CMAKE_EXE_LINKER_FLAGS_RELEASE=/DEBUG /INCREMENTAL:NO',
            '-D', "VCREDIST64=$env:VCToolsRedistDir/vc_redist.x64.exe"
          )
        }
        cmake @configureArgs 2>&1 | Tee-Object -FilePath "${{ github.workspace }}/ci-logs/02-configure.txt"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Build OpenMW
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force "${{ github.workspace }}/ci-logs" | Out-Null
        cmake --build ${{ github.workspace }}/build 2>&1 | Tee-Object -FilePath "${{ github.workspace }}/ci-logs/03-build.txt"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Show sccache stats
      if: always()
      shell: pwsh
      run: |
        if ($env:SCCACHE_PATH) {
          & $env:SCCACHE_PATH --show-stats
        } elseif (Get-Command sccache -ErrorAction SilentlyContinue) {
          sccache --show-stats
        } else {
          Write-Warning "sccache was not found."
        }

    - name: Copy missing DLLs
      run: |
        cp ${{ github.workspace }}/deps/vcpkg-x64-windows-${{ inputs.msvc }}-${{ inputs.vcpkg-deps-tag }}/installed/x64-windows/bin/Release/MyGUIEngine.dll ${{ github.workspace }}/build
        cp -Filter *.dll -Recurse ${{ github.workspace }}/deps/vcpkg-x64-windows-${{ inputs.msvc }}-${{ inputs.vcpkg-deps-tag }}/installed/x64-windows/bin/osgPlugins-3.6.5 ${{ github.workspace }}/build
        cp ${{ github.workspace }}/deps/vcpkg-x64-windows-${{ inputs.msvc }}-${{ inputs.vcpkg-deps-tag }}/installed/x64-windows/bin/*.dll ${{ github.workspace }}/build

    - name: Copy Qt DLLs
      working-directory: ${{ github.workspace }}/deps/Qt/6.6.3/msvc2019_64
      run: |
        cp bin/Qt6Core.dll ${{ github.workspace }}/build
        cp bin/Qt6Gui.dll ${{ github.workspace }}/build
        cp bin/Qt6Network.dll ${{ github.workspace }}/build
        cp bin/Qt6OpenGL.dll ${{ github.workspace }}/build
        cp bin/Qt6OpenGLWidgets.dll ${{ github.workspace }}/build
        cp bin/Qt6Widgets.dll ${{ github.workspace }}/build
        cp bin/Qt6Svg.dll ${{ github.workspace }}/build
        mkdir ${{ github.workspace }}/build/styles
        cp plugins/styles/qwindowsvistastyle.dll ${{ github.workspace }}/build/styles
        mkdir ${{ github.workspace }}/build/platforms
        cp plugins/platforms/qwindows.dll ${{ github.workspace }}/build/platforms
        mkdir ${{ github.workspace }}/build/imageformats
        cp plugins/imageformats/qsvg.dll ${{ github.workspace }}/build/imageformats
        mkdir ${{ github.workspace }}/build/iconengines
        cp plugins/iconengines/qsvgicon.dll ${{ github.workspace }}/build/iconengines

    - name: Create symbol server directory structure
      if: ${{ inputs.package }}
      working-directory: ${{ github.workspace }}/build
      run: |
        ${{ github.workspace }}\CI\Store-Symbols.ps1
        Move-Item ${{ github.workspace }}\build\SymStore ${{ github.workspace }}

    - name: Move pdb files
      run: |
        robocopy build pdb *.pdb /MOVE
        if ($lastexitcode -lt 8) {
          $global:LASTEXITCODE = $null
        }

    - name: Install OpenMW
      if: ${{ ! inputs.package }}
      run: cmake --install ${{ github.workspace }}/build --prefix ${{ github.workspace }}/install

    - name: Package OpenMW
      if: ${{ inputs.package }}
      run: |
        cpack --config "${{ github.workspace }}/build/CPackConfig.cmake" -B "${{ github.workspace }}/install"
        rm -r -Force "${{ github.workspace }}/install/_CPack_Packages"

    - name: Install OpenMW portable package tree
      if: ${{ inputs.package }}
      run: cmake --install ${{ github.workspace }}/build --prefix ${{ github.workspace }}/portable-install

    - name: Remove extra pdb files
      if: ${{ ! inputs.package }}
      shell: bash
      run: |
        find install -name '*.pdb' -delete
        rm -rf install/bin
        rm -rf install/_deps

    - name: Configure portable Fetcher client
      if: ${{ inputs.package }}
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        $clientInstallDir = "${{ github.workspace }}\install"
        if ("${{ inputs.package }}" -eq "true") {
          $clientInstallDir = "${{ github.workspace }}\portable-install"
        }
        ${{ github.workspace }}\CI\Package-WindowsClientMods.ps1 `
          -InstallDir $clientInstallDir `
          -ModBundleUrl "${{ inputs.mod-bundle-url }}" `
          -ModBundleReleaseTag "${{ inputs.mod-bundle-release-tag }}" `
          -ModBundleAsset "${{ inputs.mod-bundle-asset }}" `
          -Repository "${{ github.repository }}" `
          -IncludeTesterTools ([bool]::Parse("${{ inputs.include-tester-tools }}"))

    - name: Generate CI-ID.txt
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        job_url=$(gh run --repo ${{ github.repository }} view ${{ github.run_id }} --json jobs --jq '.jobs[] | select(.name == "windows-${{ inputs.msvc }}") | .url')
        printf "Ref ${{ github.ref }}\nJob ${job_url}\nCommit ${{ github.sha }}\n" > install/CI-ID.txt
        if [ -d portable-install ]; then cp install/CI-ID.txt portable-install/CI-ID.txt; fi
        if [ -d pdb ]; then cp install/CI-ID.txt pdb/CI-ID.txt; fi
        if [ -d SymStore ]; then cp install/CI-ID.txt SymStore/CI-ID.txt; fi

    - name: Generate Fetcher client update inventory
      if: ${{ inputs.package && inputs.release && (inputs.release-tag == 'Fetcher-Simulator' || inputs.release-tag == 'Fetcher-Simulator-Test') }}
      shell: pwsh
      run: |
        ${{ github.workspace }}\CI\Build-FetcherClientInventory.ps1 `
          -InstallDir "${{ github.workspace }}\portable-install" `
          -ClientCommit "${{ github.sha }}"

    - name: Store OpenMW archived pdb files
      if: ${{ inputs.package }}
      uses: actions/upload-artifact@v4
      with:
        name: openmw-windows-${{ inputs.msvc }}-pdb-${{ github.sha }}
        path: ${{ github.workspace }}/pdb/*

    - name: Store OpenMW installer artifacts
      if: ${{ inputs.package }}
      uses: actions/upload-artifact@v4
      with:
        name: openmw-windows-${{ inputs.msvc }}-installer-${{ github.sha }}
        path: ${{ github.workspace }}/install/*

    - name: Store OpenMW build artifacts
      if: ${{ ! inputs.package }}
      uses: actions/upload-artifact@v4
      with:
        name: openmw-windows-${{ inputs.msvc }}-${{ github.sha }}
        path: ${{ github.workspace }}/install/*

    - name: Store OpenMW portable build artifacts
      if: ${{ inputs.package }}
      uses: actions/upload-artifact@v4
      with:
        name: openmw-windows-${{ inputs.msvc }}-${{ github.sha }}
        path: ${{ github.workspace }}/portable-install/*

    - name: Store symbol server artifacts
      if: ${{ inputs.package }}
      uses: actions/upload-artifact@v4
      with:
        name: openmw-windows-${{ inputs.msvc }}-sym-store-${{ github.sha }}
        path: ${{ github.workspace }}/SymStore/*

    - name: Upload to symbol server
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: eu-west-3
      if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && inputs.package }}
      working-directory: ${{ github.workspace }}/SymStore
      run: |
        choco uninstall awscli -y
        choco install awscli -y --version=2.22.35
        aws --version
        aws --endpoint-url https://rgw.ctrl-c.liu.se s3 sync --size-only --exclude * --include *.ex_ --include *.dl_ --include *.pd_ . s3://openmw-sym

    - name: Add install directory to PATH
      shell: bash
      run: echo '${{ github.workspace }}/install' >> ${GITHUB_PATH}

    - name: Run components tests
      if: ${{ ! inputs.package }}
      shell: pwsh
      env:
        OPENMW_DEBUG_LEVEL: Verbose
      run: |
        build/components-tests.exe 2>&1 | Tee-Object -FilePath "${{ github.workspace }}/ci-logs/04-components-tests.txt"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Run OpenMW tests
      if: ${{ ! inputs.package }}
      shell: pwsh
      run: |
        build/openmw-tests.exe 2>&1 | Tee-Object -FilePath "${{ github.workspace }}/ci-logs/05-openmw-tests.txt"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Run OpenMW-CS tests
      if: ${{ ! inputs.package }}
      shell: pwsh
      run: |
        build/openmw-cs-tests.exe 2>&1 | Tee-Object -FilePath "${{ github.workspace }}/ci-logs/06-openmw-cs-tests.txt"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Run detournavigator navmeshtilescache benchmark
      if: ${{ ! inputs.package }}
      run: build/openmw_detournavigator_navmeshtilescache_benchmark.exe

    - name: Run settings access benchmark
      if: ${{ ! inputs.package }}
      run: build/openmw_settings_access_benchmark.exe

    - name: Run esm refid benchmark
      if: ${{ ! inputs.package }}
      run: build/openmw_esm_refid_benchmark.exe

    - name: Store Windows workflow logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: openmw-windows-${{ inputs.msvc }}-logs-${{ github.run_id }}
        path: ${{ github.workspace }}/ci-logs/*
        if-no-files-found: ignore
        retention-days: 14

    - name: Retarget explicit release tag
      if: ${{ inputs.release && inputs.release-tag != '' }}
      shell: bash
      run: |
        git tag -f "${{ inputs.release-tag }}" "${{ github.sha }}"
        git push origin "refs/tags/${{ inputs.release-tag }}" --force

    - name: Remove existing explicit prerelease
      if: ${{ inputs.release && inputs.release-tag != '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release delete "${{ inputs.release-tag }}" --repo "${{ github.repository }}" --yes || true

    - name: Stage OpenMW release assets
      if: ${{ inputs.release }}
      shell: pwsh
      run: |
        $assets = "${{ github.workspace }}\release-assets"
        New-Item -ItemType Directory -Force $assets | Out-Null
        $portableRoot = "${{ github.workspace }}\install"
        if ("${{ inputs.package }}" -eq "true") {
          if ("${{ inputs.release-include-installer }}" -eq "true") {
            Copy-Item -Path "${{ github.workspace }}\install\*.exe" -Destination $assets
          }
          $portableRoot = "${{ github.workspace }}\portable-install"
        }
        $zipName = "${{ inputs.release-zip-name }}"
        if ([string]::IsNullOrWhiteSpace($zipName)) {
          $zipName = "openmw-windows-${{ inputs.msvc }}-${{ github.sha }}.zip"
        }
        $zip = Join-Path $assets $zipName
        Compress-Archive -Path "$portableRoot\*" -DestinationPath $zip -CompressionLevel Optimal -Force

    - name: Create OpenMW client prerelease
      if: ${{ inputs.release }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.release-tag || format('openmw-windows-{0}-{1}', inputs.msvc, github.sha) }}
        target_commitish: ${{ github.sha }}
        name: ${{ inputs.release-name || format('OpenMW Windows {0} {1}', inputs.msvc, github.sha) }}
        files: ${{ github.workspace }}/release-assets/*
        prerelease: true
        draft: false
        make_latest: false
