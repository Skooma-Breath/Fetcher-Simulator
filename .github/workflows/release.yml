name: Release

on:
  push:
    branches:
      - main
    tags:
      - openmw-**
  workflow_dispatch:
    inputs:
      publish-clean:
        description: Replace the legacy Fetcher-Simulator prerelease with the clean client after testers migrate
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  Tester-Tools:
    if: ${{ github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/fetcher-tester-tools.yml
    secrets: inherit

  Windows-Test:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs:
      - Tester-Tools
    uses: ./.github/workflows/windows.yml
    with:
      image: "2022"
      build-type: RelWithDebInfo
      package: true
      release: true
      release-tag: Fetcher-Simulator-Test
      release-name: Fetcher Simulator Test Channel
      release-zip-name: fetcher-simulator-test.zip
      release-include-installer: false
      mod-bundle-release-tag: openmw-client-mods-mp-clients
      mod-bundle-asset: openmw-client-mods.zip
      include-tester-tools: true
    secrets: inherit

  Ubuntu-Test:
    if: ${{ github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/ubuntu.yml
    with:
      image: ubuntu-24.04
      build-type: RelWithDebInfo
      package: true
      release: true
      release-tag: Fetcher-Simulator-Ubuntu
      release-name: Fetcher Simulator Ubuntu 24.04
      release-asset-name: fetcher-simulator-ubuntu-24.04-amd64.deb
    secrets: inherit

  Windows-Clean:
    if: ${{ always() && (github.ref != 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.publish-clean && needs.Windows-Test.result == 'success')) }}
    needs:
      - Windows-Test
    uses: ./.github/workflows/windows.yml
    with:
      image: "2022"
      build-type: ${{ github.ref == 'refs/heads/main' && 'RelWithDebInfo' || 'Release' }}
      package: true
      release: true
      release-tag: ${{ github.ref == 'refs/heads/main' && 'Fetcher-Simulator' || '' }}
      release-name: ${{ github.ref == 'refs/heads/main' && 'Fetcher-Simulator' || '' }}
      release-zip-name: ${{ github.ref == 'refs/heads/main' && 'fetcher-simulator.zip' || '' }}
      release-include-installer: ${{ github.ref != 'refs/heads/main' }}
      include-tester-tools: false
    secrets: inherit

  MacOS:
    strategy:
      fail-fast: true
      matrix:
        args:
          - image: macos-15
          - image: macos-15-intel
    uses: ./.github/workflows/macos.yml
    with:
      image: ${{ matrix.args.image }}
      build-type: Release
