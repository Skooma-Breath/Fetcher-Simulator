name: Codex Windows client build

run-name: codex windows client (${{ inputs.image }}, ${{ inputs.build-type }}, package=${{ inputs.package }}, ${{ inputs.run-label }})

on:
  workflow_dispatch:
    inputs:
      image:
        description: Windows runner image suffix
        required: true
        default: "2022"
        type: choice
        options:
          - "2022"
      build-type:
        description: CMake build type
        required: true
        default: RelWithDebInfo
        type: choice
        options:
          - RelWithDebInfo
          - Release
          - Debug
      package:
        description: Create installer/package artifacts instead of test install artifacts
        required: true
        default: false
        type: boolean
      release:
        description: Publish the OpenMW client build artifact as a GitHub prerelease
        required: true
        default: false
        type: boolean
      release-tag:
        description: Optional release tag; defaults to openmw-windows-<msvc>-<sha>
        required: false
        default: ""
        type: string
      release-name:
        description: Optional release title
        required: false
        default: ""
        type: string
      release-zip-name:
        description: Optional release zip asset name
        required: false
        default: ""
        type: string
      release-include-installer:
        description: Upload the installer exe as a release asset
        required: true
        default: true
        type: boolean
      mod-bundle-url:
        description: Optional direct URL to a zip containing Data Files and openmw-client-package.json
        required: false
        default: ""
        type: string
      mod-bundle-release-tag:
        description: Optional release tag containing the mod bundle asset
        required: false
        default: ""
        type: string
      mod-bundle-asset:
        description: Mod bundle asset name when using mod-bundle-release-tag
        required: false
        default: openmw-client-mods.zip
        type: string
      include-tester-tools:
        description: Include Fetcher tester updater/install scripts in the portable client
        required: true
        default: false
        type: boolean
      run-label:
        description: Optional label to make this run easy to find in gh run list
        required: false
        default: codex
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: codex-windows-client-${{ github.ref }}-${{ inputs.run-label }}
  cancel-in-progress: false

jobs:
  Windows:
    uses: ./.github/workflows/windows.yml
    with:
      image: ${{ inputs.image }}
      build-type: ${{ inputs.build-type }}
      package: ${{ inputs.package }}
      release: ${{ inputs.release }}
      release-tag: ${{ inputs.release-tag }}
      release-name: ${{ inputs.release-name }}
      release-zip-name: ${{ inputs.release-zip-name }}
      release-include-installer: ${{ inputs.release-include-installer }}
      mod-bundle-url: ${{ inputs.mod-bundle-url }}
      mod-bundle-release-tag: ${{ inputs.mod-bundle-release-tag }}
      mod-bundle-asset: ${{ inputs.mod-bundle-asset }}
      include-tester-tools: ${{ inputs.include-tester-tools }}
    secrets: inherit
