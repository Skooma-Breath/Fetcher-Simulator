name: Fetcher tester tools prerelease

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

concurrency:
  group: fetcher-tester-tools-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Build digest-backed compatibility and tester tools packages
        shell: pwsh
        run: |
          .\CI\zhi-patch\Build-FetcherZhiPatch.ps1 `
            -OutputDirectory "${{ github.workspace }}\release-assets" `
            -SourceCommit "${{ github.sha }}"
          .\CI\Build-FetcherTesterTools.ps1 `
            -OutputDir "${{ github.workspace }}\release-assets" `
            -SourceCommit "${{ github.sha }}"

      - name: Replace stable ZHI compatibility patch release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .\CI\Publish-StableGitHubRelease.ps1 `
            -Repository "${{ github.repository }}" `
            -Tag "fetcher-zhi-compat-patch-v1" `
            -TargetCommit "${{ github.sha }}" `
            -Title "Fetcher ZHI Multiplayer Compatibility Patch v1" `
            -Notes "Disables Zerkish Hotkeys Improved's first-time modal because it can trap multiplayer users during character creation." `
            -Assets "${{ github.workspace }}\release-assets\fetcher-zhi-compat-patch-v1.zip"

      - name: Replace stable tester tools prerelease
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .\CI\Publish-StableGitHubRelease.ps1 `
            -Repository "${{ github.repository }}" `
            -Tag "fetcher-tester-tools" `
            -TargetCommit "${{ github.sha }}" `
            -Title "Fetcher Simulator Tester Tools" `
            -Notes "Install or refresh the Fetcher test channel without copying individual files. Download and double-click Join-Fetcher-Test-Channel.bat once; subsequent updates are handled by Update-Fetcher-Simulator.bat." `
            -Assets @(
              "${{ github.workspace }}\release-assets\fetcher-tester-tools.zip"
              "${{ github.workspace }}\release-assets\Install-Fetcher-Tester-Tools.ps1"
              "${{ github.workspace }}\release-assets\Join-Fetcher-Test-Channel.bat"
              "${{ github.workspace }}\release-assets\fetcher-bardcraft-umo.json"
            )
